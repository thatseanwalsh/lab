# .github/workflows/build-erpnext.yml
name: Build ERPNext Custom Image

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apps.json'
      - '.github/workflows/build-erpnext.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Checkout frappe_docker Containerfile
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare apps.json
        run: echo "APPS_JSON_BASE64=$(base64 -w 0 .github/workflows/apps.json)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: frappe_docker
          file: frappe_docker/images/custom/Containerfile
          push: true
          tags: ghcr.io/thatseanwalsh/erpnext-custom:v16
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            PYTHON_VERSION=3.11
            NODE_VERSION=18.20.4
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max